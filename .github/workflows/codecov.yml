name: Codecov

permissions:
  contents: read
  id-token: write

on:
  push:
    branches:
      - Main
  pull_request:
    branches:
      - Main

jobs:
  codecov:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clean Python cache
        run: |
          find . -type d -name "__pycache__" -exec rm -rf {} +
          find . -name "*.pyc" -delete

      - name: Run tests with coverage (simple: cover repo root)
        run: |
          pytest -v --cov=. --cov-report=term-missing --cov-report=xml:coverage.xml --cov-config=pyproject.toml --cov-omit="tests/*"

      - name: Show coverage summary (source of truth)
        run: |
          python -m coverage report -m

      - name: Show coverage debug info
        run: |
          python -m coverage debug sys
          python -m coverage debug config

      - name: Upload coverage to Codecov (verbose)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
          verbose: true
