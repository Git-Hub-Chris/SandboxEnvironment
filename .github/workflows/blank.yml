# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "Main" branch
  push:
    branches: [ "Main" ]
  pull_request:
    branches: [ "Main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
permissions:
  contents: read

jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
        env:
          ACTIONS_STEP_DEBUG: true
        continue-on-error: true
        id: checkout_attempt_1

      - name: Wait before retry
        if: steps.checkout_attempt_1.outcome == 'failure'
        run: sleep 20

      - name: Retry checkout if needed
        if: steps.checkout_attempt_1.outcome == 'failure'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
        env:
          ACTIONS_STEP_DEBUG: true
        continue-on-error: true
        id: checkout_attempt_2

      - name: Wait before final retry
        if: steps.checkout_attempt_2.outcome == 'failure'
        run: sleep 20

      - name: Final retry checkout if needed
        if: steps.checkout_attempt_2.outcome == 'failure'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
        env:
          ACTIONS_STEP_DEBUG: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: python -m pytest -v --cov=. --cov-report=term-missing

      - name: Run Ruff linter
        run: ruff check .

      - name: Check code formatting with Black
        run: black --check .

      - name: Run type checking with mypy
        run: mypy sandboxenvironment/calculator.py sandboxenvironment/hello.py
        continue-on-error: true
